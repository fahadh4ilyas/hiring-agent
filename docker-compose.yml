version: "3.8"

services:
  hiring-agent:
    build: .
    container_name: hiring-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./cache:/app/cache
      - ./logs:/app/logs
      - ./resume_evaluations.csv:/app/resume_evaluations.csv
    restart: unless-stopped
